name: EchoWrite
options:
  bundleIdPrefix: com.echowrite
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_STYLE: Automatic
    OTHER_LDFLAGS: "-ObjC"

targets:
  EchoWriteKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: KeyboardViewController.swift
      - path: echowrite_core.swift
      - path: EchoWriteBindingsShim.swift
      - path: EchoWriteShared.swift
      - path: DarwinNotificationCenter.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.echowrite.app.keyboard
        INFOPLIST_FILE: EchoWriteKeyboard-Info.plist
        CODE_SIGN_ENTITLEMENTS: EchoWriteKeyboard.entitlements
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)"
    dependencies:
      - framework: EchoWriteCore.xcframework
        embed: false
      - sdk: Accelerate.framework
      - sdk: libc++.tbd
      - sdk: CoreML.framework

  EchoWriteApp:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: echowrite_core.swift
      - path: EchoWriteBindingsShim.swift
      - path: EchoWriteShared.swift
      - path: DarwinNotificationCenter.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.echowrite.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: EchoWrite
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: App/EchoWriteApp.entitlements
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)"
    dependencies:
      - framework: EchoWriteCore.xcframework
        embed: true
      - sdk: Accelerate.framework
      - sdk: libc++.tbd
      - sdk: CoreML.framework
      - sdk: AudioToolbox.framework
      - sdk: AVFoundation.framework
      - target: EchoWriteKeyboard
        embed: true
